# Duja release pipeline — builds, packages, signs, and publishes a tagged release.
#
# Trigger: pushing a `v*` tag publishes a GitHub Release with the Windows
# installer, a portable zip, SHA256SUMS, minisign signatures, and a build-
# provenance attestation. `workflow_dispatch` builds the same artifacts and
# uploads them as workflow artifacts for inspection WITHOUT publishing (a dry
# run) — use it to validate the pipeline before tagging.
#
# Every run first re-validates the tagged commit (cargo-deny + clippy + tests),
# so advisory/yank drift — or a tag placed on a commit that never passed CI —
# fails the run before anything is built or published.
#
# All third-party actions are SHA-pinned (supply-chain policy, as in ci.yml).
# Shell tools installed via choco (Inno Setup, minisign) are outside that policy,
# exactly like the apt-get/choco steps in ci.yml; the choco install is version-
# pinned + checksum-required, and the minisign download is hash-checked.
#
# github.* context (tag name, event) is NEVER interpolated into a run body — it
# flows through a step `env:` map and is read as $env:VAR, so a crafted tag name
# cannot inject shell into this privileged (contents/id-token/attestations:write,
# minisign-secret-holding) job. Full runbook: docs/release-checklist.md.
#
# One-time setup before the first real tag (see SECURITY.md):
#   1. minisign -G -W -p minisign.pub -s minisign.key   (passwordless key)
#   2. add the repo secret MINISIGN_SECRET_KEY = the full contents of minisign.key
#   3. commit minisign.pub and paste its line into SECURITY.md/README
#   4. keep minisign.key offline (never committed)

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# contents: write → create the Release + upload assets.
# id-token + attestations: write → build-provenance attestation.
permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: build & publish (windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # git-cliff needs full history + tags to render the release notes.
          fetch-depth: 0

      # Resolve the version and decide whether this run publishes. On a tag push
      # the tag (minus `v`) MUST equal the workspace version, or we fail fast
      # rather than ship a mislabeled installer.
      - name: Resolve version
        shell: pwsh
        env:
          # Pass github context through env — never splice ${{ github.* }} into a
          # run body (a crafted tag name would otherwise inject PowerShell here).
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^version = "(.+?)"' |
                  Select-Object -First 1).Matches.Groups[1].Value
          # Publish ONLY on a tag *push* — never on workflow_dispatch, even if it
          # was manually pointed at a tag ref (that path is a dry run by design).
          if ($env:EVENT_NAME -eq 'push' -and $env:REF_TYPE -eq 'tag') {
            $tag = $env:REF_NAME -replace '^v',''
            if ($tag -ne $ver) { throw "tag $tag does not match Cargo.toml version $ver" }
            $publish = 'true'
          } else {
            $publish = 'false'
          }
          "VERSION=$ver" >> $env:GITHUB_ENV
          "PUBLISH=$publish" >> $env:GITHUB_ENV
          Write-Host "version=$ver publish=$publish"

      # ---- Release gate: re-validate the tagged commit ----------------------
      # The 3-OS matrix already ran on the merge PR; re-run the quality gate here
      # on the exact tagged commit to catch advisory/yank drift since the merge
      # and to refuse a tag placed on a commit that never passed CI. Runs on BOTH
      # the publish (tag push) and dry-run (workflow_dispatch) paths and fails the
      # job on any error, so a red or advisory-drifted tag can never publish.
      # No rust-cache below this point: the signed build stays hermetic (a clean
      # build is the trade for reproducibility). ci.yml keeps its cache.
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-deny,cargo-nextest
      - name: Gate (cargo-deny)
        run: cargo deny check
      - name: Gate (clippy)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Gate (tests)
        run: cargo nextest run --workspace --all-features
      - name: Gate (doctests)
        run: cargo test --doc --workspace --all-features

      # rust-toolchain.toml pins 1.96.1; rustup installs it on first use.
      - name: Build release binaries
        run: cargo build --release --locked -p duja-app -p dujactl

      # Portable zip (staging + Compress-Archive), via the dependency-free xtask.
      - name: Stage portable archive
        shell: pwsh
        run: cargo run --release -p xtask -- dist --version $env:VERSION

      # Inno Setup installer. Not reliably preinstalled on windows-latest → install.
      - name: Install Inno Setup
        # Pin the exact version and require a verified checksum so a bumped or
        # compromised upstream package can't slip into the signed build. 6.7.1 is
        # the current stable Inno Setup 6 on Chocolatey (no 6.4.x is published there).
        run: choco install innosetup --version=6.7.1 -y --no-progress --require-checksums
      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" packaging\windows\duja.iss

      # ---- Optional: Azure Trusted Signing (Authenticode) — INERT today -----
      # Duja ships no code-signing certificate yet, so this step is guarded off.
      # When a cert exists, Authenticode-signing the installer stops SmartScreen
      # warning on first run. It runs BEFORE Compute SHA256SUMS on purpose, so the
      # checksums AND the provenance attestation cover the *signed* bytes —
      # enabling it is a config-only change, no step reordering.
      #
      # Enable it with NO edit to this file:
      #   1. Create an Azure Trusted Signing account + certificate profile.
      #   2. Repo variables: AZURE_SIGN=true, AZURE_SIGN_ENDPOINT,
      #      AZURE_SIGN_ACCOUNT, AZURE_SIGN_CERT_PROFILE.
      #   3. Repo secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
      #      (or wire OIDC via this job's existing `id-token: write` and drop the
      #      client secret — the more secure option).
      # Only the installer .exe is Authenticode-signable; the portable .zip and
      # SHA256SUMS are not PE files and stay covered by minisign + provenance.
      - name: Sign installer (Azure Trusted Signing)
        if: env.PUBLISH == 'true' && vars.AZURE_SIGN == 'true'
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGN_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGN_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGN_CERT_PROFILE }}
          files: ${{ github.workspace }}/target/dist/duja-setup-${{ env.VERSION }}.exe

      # SHA256SUMS over the two shippable artifacts (two-space `sha256sum -c` form).
      - name: Compute SHA256SUMS
        shell: pwsh
        run: |
          Push-Location target/dist
          $files = "duja-setup-${env:VERSION}.exe",
                   "duja-${env:VERSION}-windows-x64.zip"
          # Write LF-only and no BOM: Set-Content -Encoding ascii emits CRLF, which
          # leaves a trailing \r on every filename so Linux `sha256sum -c SHA256SUMS`
          # fails even though the hashes are correct. Keep the two-space form.
          $lines = Get-FileHash $files -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) }
          $content = ($lines -join "`n") + "`n"
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) 'SHA256SUMS'), $content)
          Get-Content SHA256SUMS
          Pop-Location

      # Dry-run visibility: always upload the built artifacts for inspection.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: duja-${{ env.VERSION }}-windows-x64
          path: |
            target/dist/duja-setup-${{ env.VERSION }}.exe
            target/dist/duja-${{ env.VERSION }}-windows-x64.zip
            target/dist/SHA256SUMS
          if-no-files-found: error

      # ---- Publish-only steps (tag pushes) ----------------------------------

      # Sign every artifact (installer, zip, SHA256SUMS) with the offline key.
      - name: Sign artifacts (minisign)
        if: env.PUBLISH == 'true'
        shell: pwsh
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MINISIGN_KEY)) {
            throw "MINISIGN_SECRET_KEY secret is not set — see SECURITY.md"
          }
          # Use the official minisign 0.12 (pinned + hash-checked). Chocolatey's
          # minisign is 0.8.0, which cannot read a passwordless key generated by
          # a modern minisign ("Unsupported key derivation function").
          $zip = "$env:RUNNER_TEMP\minisign.zip"
          $url = "https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip"
          $sha = "37b600344e20c19314b2e82813db2bfdcc408b77b876f7727889dbd46d539479"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $got = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          if ($got -ne $sha) { throw "minisign zip hash mismatch: $got" }
          Expand-Archive $zip -DestinationPath "$env:RUNNER_TEMP\minisign" -Force
          $minisign = "$env:RUNNER_TEMP\minisign\minisign-win64\x86_64\minisign.exe"
          # Write the secret key to an ABSOLUTE path under RUNNER_TEMP so the
          # finally wipes it even if signing throws while CWD is inside target/dist
          # (Push-Location below moves us there before the signing loop).
          $keyPath = Join-Path $env:RUNNER_TEMP 'minisign.key'
          $env:MINISIGN_KEY | Set-Content -NoNewline -Encoding ascii -LiteralPath $keyPath
          try {
            Push-Location target/dist
            foreach ($f in "duja-setup-${env:VERSION}.exe",
                            "duja-${env:VERSION}-windows-x64.zip",
                            "SHA256SUMS") {
              & $minisign -S -s $keyPath -m $f -c "duja ${env:VERSION}"
              if ($LASTEXITCODE -ne 0) { throw "minisign failed for $f" }
            }
            Pop-Location
          } finally {
            # Absolute path → wiped regardless of the CWD when the block unwinds.
            Remove-Item -LiteralPath $keyPath -Force -ErrorAction SilentlyContinue
          }

      - name: Attest build provenance
        if: env.PUBLISH == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            target/dist/duja-setup-${{ env.VERSION }}.exe
            target/dist/duja-${{ env.VERSION }}-windows-x64.zip

      - name: Install git-cliff
        if: env.PUBLISH == 'true'
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: git-cliff
      - name: Generate release notes
        if: env.PUBLISH == 'true'
        shell: pwsh
        env:
          # Same rule as Resolve version: the tag reaches git-cliff via env and is
          # passed as a single quoted argument, never spliced into the run body.
          REF_NAME: ${{ github.ref_name }}
        run: git cliff --tag "$env:REF_NAME" --latest --strip all -o RELEASE_NOTES.md

      - name: Create GitHub Release
        if: env.PUBLISH == 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            target/dist/duja-setup-${{ env.VERSION }}.exe
            target/dist/duja-${{ env.VERSION }}-windows-x64.zip
            target/dist/SHA256SUMS
            target/dist/*.minisig
