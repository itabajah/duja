# cargo-deny configuration — supply-chain gate, runs in CI on every PR.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Allowlist only; anything else fails CI and needs an explicit exception here.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
]
# Slint is consumed under its Royalty-Free license (ADR-0008); the exception is
# added here the moment the dependency lands (P1/P4), not before.

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path-only deps (duja-core etc.) carry no version — that's fine;
# the wildcard ban is aimed at registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
