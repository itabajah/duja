# git-cliff configuration — CHANGELOG.md is regenerated at every tag.

[changelog]
header = """
# Changelog

All notable changes to Duja are documented here. The format is based on
[Keep a Changelog](https://keepachangelog.com), generated by
[git-cliff](https://git-cliff.org) from conventional commits.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^(chore|ci|build)", skip = true },
  { message = "^revert", group = "Reverted" },
]
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
