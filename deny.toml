# cargo-deny configuration — supply-chain gate, runs in CI on every PR.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# All four ignores below are transitively pinned by slint 1.17.1 (via winit /
# resvg / image); none is reachable from untrusted input in Duja. Revisit on
# every Slint upgrade (P8 hardening re-audits this list).
ignore = [
    # quick-xml DoS advisories: quick-xml sits under wayland-scanner, a
    # build-time proc-macro parsing the wayland protocol XML bundled in the
    # crates themselves (linux-only, never attacker-controlled).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # unmaintained (not vulnerable): paste is a build-time proc-macro under
    # image/exr; ttf-parser is pinned by fontdb/resvg inside Slint.
    "RUSTSEC-2024-0436",
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser unmaintained; pinned by slint's resvg" },
    # unmaintained gtk-rs GTK3 bindings family + proc-macro-error: pulled ONLY
    # by tray-icon's linux backend (libappindicator). Duja's linux tray backend
    # is decided at P7 (ADR-0010 evaluates ksni, which drops GTK entirely);
    # until then these are linux-only, build-graph-only on our CI, and carry no
    # vulnerability — they are maintenance-status advisories.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
]

[licenses]
version = 2
# Allowlist only; anything else fails CI and needs an explicit exception here.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
]
# Slint is consumed under its Royalty-Free license (ADR-0008 / plan §8): the
# tri-license is "GPL-3.0-only OR LicenseRef-Slint-Royalty-free-2.0 OR
# LicenseRef-Slint-Software-3.0" and Duja takes the royalty-free option —
# never GPL. The exception is scoped to the Slint family only so a GPL
# license appearing anywhere else still fails the gate.
exceptions = [
    { crate = "slint", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "slint-build", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "slint-macros", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-core", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-core-macros", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-common", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-compiler", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-backend-winit", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-backend-selector", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-backend-testing", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "i-slint-renderer-software", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "vtable", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    { crate = "vtable-macro", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    # Pulled into the deny graph only by `graph.all-features = true` (we build
    # the software renderer; skia is never enabled in any build profile).
    { crate = "i-slint-renderer-skia", allow = ["LicenseRef-Slint-Royalty-free-2.0"] },
    # Fuzz-only tooling (the fuzz/ workspace); NCSA is the permissive
    # University of Illinois/NCSA license.
    { crate = "libfuzzer-sys", allow = ["NCSA"] },
    # The Mozilla CA root bundle shipped with rustls (via ureq's `tls` feature,
    # the opt-in update check, P5). CDLA-Permissive-2.0 is a permissive data
    # license covering the certificate *data*, not code; scoped to webpki-roots
    # only so it cannot leak the allowance to anything else. Covers both the
    # 0.26 and 1.0 versions ureq pulls.
    { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path-only deps (duja-core etc.) carry no version — that's fine;
# the wildcard ban is aimed at registry deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
